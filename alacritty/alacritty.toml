# Alacritty terminal emulator configuration
# https://alacritty.org/config-alacritty.html

[general]
live_config_reload = true

[env]
# Set the TERM environment variable for this terminal
TERM = "alacritty"

[window]
# Window opacity (0.0 - 1.0)
opacity = 0.95
# Window padding
padding = { x = 10, y = 10 }
# macOS Option key (⌥) sends Esc prefix — required for fzf's Option+C and other Alt bindings
option_as_alt = "Both"

[font]
# brew install --cask font-maple-mono font-maple-mono-nf
normal = { family = "Maple Mono NF", style = "Regular" }
size = 12.0

[cursor]
style = { shape = "Underline", blinking = "Off" }
thickness = 0.15

[mouse]
# Right-click to paste
bindings = [
  { mouse = "Right", action = "Paste" }
]
