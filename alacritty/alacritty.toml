# Alacritty terminal emulator configuration
# https://alacritty.org/config-alacritty.html

[general]
live_config_reload = true

[env]
# Set the TERM environment variable for this terminal
TERM = "alacritty"

[window]
# Window opacity (0.0 - 1.0)
opacity = 0.95
# Window padding
padding = { x = 10, y = 10 }

[font]
normal = { family = "Monaco", style = "Regular" }
size = 12.0

[cursor]
style = { shape = "Underline", blinking = "Off" }
thickness = 0.15

[mouse]
# Right-click to paste
bindings = [
  { mouse = "Right", action = "Paste" }
]

[keyboard]
# macOS Alt key handling: send Esc prefix (e.g., Alt+C → Esc+C)
# Required for fzf shortcuts (Ctrl+T, Alt+C, Ctrl+R) and other alt-key bindings
bindings = []
