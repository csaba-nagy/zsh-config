# Alacritty terminal emulator configuration
# https://alacritty.org/config-alacritty.html

[general]
live_config_reload = true

[env]
# Set the TERM environment variable for this terminal
TERM = "alacritty"

[window]
# Window opacity (0.0 - 1.0)
opacity = 1.0
# Window padding
padding = { x = 10, y = 10 }
# macOS Option key (⌥) sends Esc prefix — required for fzf's Option+C and other Alt bindings
option_as_alt = "Both"

[font]
# brew install --cask font-maple-mono font-maple-mono-nf
normal = { family = "Maple Mono NF", style = "Regular" }
size = 12.0

[cursor]
style = { shape = "Underline", blinking = "Off" }
thickness = 0.15

[mouse]
# Right-click to paste
bindings = [
  { mouse = "Right", action = "Paste" }
]

# =============================================================================
# MAPLE THEME — Dark (default) & Light
# Switch by commenting/uncommenting the sections below
# =============================================================================

# Maple Dark
[colors.primary]
background = "#1e1e1f"
foreground = "#cbd5e1"

[colors.cursor]
cursor = "#8d9db4"
text = "#1e1e1f"

[colors.normal]
black   = "#44444b"
red     = "#edabab"
green   = "#a4dfae"
yellow  = "#eecfa0"
blue    = "#8fc7ff"
magenta = "#c6b9ca"
cyan    = "#89cdca"
white   = "#cbd5e1"

[colors.bright]
black   = "#5f5f68"
red     = "#f5b8b8"
green   = "#b3f5cf"
yellow  = "#f9deb4"
blue    = "#a4d8ff"
magenta = "#d5c9d8"
cyan    = "#9dd9d7"
white   = "#fafafa"

