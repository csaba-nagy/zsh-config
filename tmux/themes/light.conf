# Catppuccin Latte (light)

set -g status-style          "bg=#eff1f5,fg=#4c4f69"
set -g message-style         "bg=#eff1f5,fg=#d20f39"
set -g message-command-style "bg=#eff1f5,fg=#1e66f5"

set -g pane-border-style        "fg=#ccd0da"
set -g pane-active-border-style "fg=#1e66f5"

set -g window-status-style          "fg=#9ca0b0"
set -g window-status-current-style  "fg=#1e66f5,bold"
set -g window-status-activity-style "fg=#df8e1d,bold"

set -g status-left  "#[bg=#1e66f5,fg=#eff1f5,bold] #S #[bg=#eff1f5,fg=#1e66f5]#{?client_prefix, #[fg=#d20f39][^A]#[fg=#1e66f5],}#{?window_zoomed_flag, #[fg=#40a02b][Z]#[fg=#1e66f5],} "
set -g status-right "#(~/.config/zsh/scripts/tmux-sys-info.sh)#[fg=#9ca0b0]  %H:%M  %d %b "
