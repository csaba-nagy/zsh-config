# ~/.config/tmux/tmux.conf
# Opinionated tmux configuration — no plugins, self-contained.

# =============================================================================
# GENERAL
# =============================================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true color passthrough
set -g history-limit 50000
set -g base-index 1            # windows start at 1, not 0
set -g pane-base-index 1       # panes start at 1, not 0
set -g renumber-windows on     # close window 2 of 1-2-3 → becomes 1-2
set -sg escape-time 0          # no ESC delay (important for vim/neovim)
set -g focus-events on         # pass focus events through to applications
set -g mouse on
set -g set-clipboard on

# Rename windows to the current command (not full path)
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# =============================================================================
# PREFIX  (Ctrl+a — more ergonomic than Ctrl+b)
# =============================================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix           # Ctrl+a Ctrl+a sends literal Ctrl+a

# =============================================================================
# KEY BINDINGS
# =============================================================================

# Reload config in place
bind r source-file ~/.config/zsh/tmux/tmux.conf \; display "tmux config reloaded"

# Split panes — intuitive symbols, inherit current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation — vim-style (no prefix needed with -n flag would be too
# aggressive; keep prefix to avoid conflicts with vim splits)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing — repeatable (-r) with 500ms window
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r [ previous-window
bind -r ] next-window
bind Tab last-window           # toggle between last two active windows

# Pane zoom
bind z resize-pane -Z

# 2x2 grid layout (Shift+= is +)
bind + \
  split-window -h \; \
  split-window -v \; \
  select-pane -t 0 \; \
  split-window -v \; \
  select-layout tiled

# Session management
bind S choose-session          # interactive session picker
bind N new-session -A          # new or attach named session
bind X confirm-before -p "kill session #S? (y/n)" kill-session
bind R command-prompt -I "#S" -p "rename session to:" "rename-session -- '%%'"
bind g display-popup -w 60% -h 50% -E "~/.config/zsh/scripts/tmux-sessionizer.sh" # create and list sessions
bind t display-popup -w 80% -h 70% -E "tmux new-session -A -s scratch"            # floating scratch terminal

# Move window left/right
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# =============================================================================
# COPY MODE  (vi)
# =============================================================================
set -g mode-keys vi

bind Enter copy-mode

bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
# macOS clipboard: handled natively via set-clipboard on (OSC 52)

# =============================================================================
# ACTIVITY MONITORING
# =============================================================================
set -g monitor-activity on
set -g visual-activity off     # color change only, no status-bar message

# =============================================================================
# STATUS BAR  (Maple theme — Dark by default, Light commented below)
# =============================================================================
set -g status on
set -g status-interval 5       # 5s: time stays fresh, sys-info script ~0.3s async
set -g status-position bottom
set -g status-justify left

# Maple Dark theme (default)
set -g status-style "bg=#1e1e1f,fg=#cbd5e1"
set -g window-status-style "fg=#999999"
set -g window-status-current-style "fg=#8dbe74,bold"
set -g window-status-activity-style "fg=#eecfa0,bold"

# Maple Light theme (comment out Dark above, uncomment below to switch)
# set -g status-style "bg=#fffffe,fg=#475569"
# set -g window-status-style "fg=#999999"
# set -g window-status-current-style "fg=#4a8c3a,bold"
# set -g window-status-activity-style "fg=#a58e3a,bold"

set -g window-status-format         " #I #W "
set -g window-status-current-format " #I #W "
set -g window-status-separator      ""

set -g status-left-length 50
set -g status-right-length 120

set -g status-left  " #S "
set -g status-right "#(~/.config/zsh/scripts/tmux-sys-info.sh)#[default]  %H:%M  %d %b "

# C-a B → full-screen btop popup (GPU, CPU, MEM, disk — all in one view)
bind B display-popup -w 95% -h 95% -E "btop"

# =============================================================================
# MACHINE-LOCAL OVERRIDES  (gitignored — safe for per-machine tweaks)
# =============================================================================
source-file -q ~/.config/zsh/tmux/local.conf
