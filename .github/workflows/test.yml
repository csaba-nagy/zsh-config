name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Primary: macOS — the platform this config targets
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: bash scripts/test.sh

  # Secondary: fast Linux job — catches syntax errors in seconds
  syntax-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh
      - name: Run test suite
        run: bash scripts/test.sh
